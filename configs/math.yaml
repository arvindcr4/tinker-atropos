# Math environment configuration for Tinker-Atropos
# Supports long-context models and reasoning-intensive problems

# Environment configuration
env:
  group_size: 16
  batch_size: 16
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-4B-Instruct-2507"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  wandb_name: "atropos-tinker-math-env"
  ensure_scores_not_the_same: false
  max_token_length: 16384
  max_num_workers: 24
  total_steps: 50
  steps_per_eval: 25

# OpenAI-compatible server configuration
openai:
  - model_name: "Qwen/Qwen3-4B-Instruct-2507"
    base_url: "http://localhost:8001/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 256

# Tinker-specific configuration
tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 16384
  checkpoint_dir: "./temp/"
  save_checkpoint_interval: 0
  wandb_project: "atropos-tinker"
  wandb_group: null
  wandb_run_name: "atropos-tinker-run"

slurm: false
testing: false
